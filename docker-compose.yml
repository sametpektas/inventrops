services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventrops
      POSTGRES_USER: inventrops
      POSTGRES_PASSWORD: inventrops_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventrops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://inventrops:inventrops_secret@db:5432/inventrops?schema=public
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=production_secret_change_me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin-panel:
    build:
      context: ./admin-panel
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
