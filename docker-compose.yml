services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-inventrops}
      POSTGRES_USER: ${DB_USER:-inventrops}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventrops_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-inventrops}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      - DB_USER=${DB_USER:-inventrops}
      - DB_PASSWORD=${DB_PASSWORD:-inventrops_secret}
      - DB_NAME=${DB_NAME:-inventrops}
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgresql://${DB_USER:-inventrops}:${DB_PASSWORD:-inventrops_secret}@db:5432/${DB_NAME:-inventrops}?schema=public&connect_timeout=10
      - REDIS_URL=redis://redis:6379/0
      - PORT=8007
      - JWT_SECRET=${JWT_SECRET:-inventrops_jwt_secret_2026}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change_this_to_a_secure_32char_key!}
    ports:
      - "8007:8007"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"const http = require('http'); const req = http.get('http://127.0.0.1:8007/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1));\"" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  admin-panel:
    build:
      context: ./admin-panel
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
